<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevBot - Dual Chat Persona AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- <link rel="stylesheet" href="./dist/output.css" /> -->

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background: radial-gradient(
          circle at top right,
          #1e1b4b,
          #0f172a,
          #020617
        );
      }
      /* Custom smooth scrollbar */
      .custom-scrollbar::-webkit-scrollbar {
        width: 5px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 99px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #475569;
      }
      /* Glassmorphism utility */
      .glass {
        background: rgba(15, 23, 42, 0.65);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .emoji-picker {
        background: rgba(15, 23, 42, 0.65) !important;
        backdrop-filter: blur(12px) !important;
        -webkit-backdrop-filter: blur(12px) !important;
        scrollbar-width: thin !important;
        scrollbar-color: #334155 transparent !important;

        border-radius: 18px !important;
        border: 1px solid #2a2a2a !important;
      }

      .emoji-picker__search-container {
        background: rgba(15, 23, 42, 0.65) !important;
      }

      .emoji-picker__search {
        background: #111 !important;
        color: #fff !important;
        border: 1px solid #333 !important;
      }

      .emoji-picker__content {
        background: rgba(0, 0, 0, 0.498) !important;
        backdrop-filter: blur(12px) !important;
        -webkit-backdrop-filter: blur(12px) !important;
      }

      .emoji-picker__preview {
        background: #000 !important;
      }

      .emoji-picker__tabs {
        background: #000 !important;
      }
    </style>
  </head>
  <body
    class="h-screen w-screen flex items-center justify-center p-0 sm:p-4 overflow-hidden text-slate-100"
  >
    <div
      class="w-full h-full max-w-6xl md:h-[85vh] glass sm:rounded-3xl shadow-2xl flex flex-col md:flex-row overflow-hidden relative"
    >
      <div
        class="w-full md:w-80 border-b md:border-b-0 md:border-r border-slate-800 flex flex-col justify-between p-4 bg-slate-950/40 shrink-0"
      >
        <div>
          <div class="flex items-center gap-3 px-2 py-3 mb-4">
            <div
              class="h-9 w-9 rounded-xl bg-gradient-to-tr from-indigo-500 to-violet-500 flex items-center justify-center shadow-lg shadow-indigo-500/30"
            >
              <i class="fa-solid fa-code text-white text-sm"></i>
            </div>
            <div>
              <h1 class="font-bold tracking-tight text-white">
                Persona DevBot
              </h1>
              <p class="text-xs text-slate-400">Chat with your instructor</p>
            </div>
          </div>

          <div class="space-y-2" id="persona-list">
            <button
              id="btn-hc"
              class="w-full text-left p-3 rounded-2xl flex items-center gap-3 transition-all duration-300 border border-indigo-500/30 bg-indigo-500/10 shadow-lg shadow-indigo-500/5 group cursor-pointer"
            >
              <div class="relative">
                <div
                  class="w-12 h-12 rounded-xl bg-gradient-to-br from-amber-500 to-orange-600 flex items-center justify-center text-white font-bold text-lg shadow-md group-hover:scale-105 transition-transform"
                >
                  HC
                </div>
                <span
                  class="absolute bottom-0 right-0 w-3.5 h-3.5 bg-emerald-500 border-2 border-slate-950 rounded-full animate-pulse"
                ></span>
              </div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center justify-between">
                  <h3 class="font-semibold text-sm text-white">
                    Hitesh Choudhary
                  </h3>
                  <span
                    class="text-[10px] text-indigo-400 font-medium px-1.5 py-0.5 rounded-md bg-indigo-500/10"
                    >PRO</span
                  >
                </div>
                <p
                  class="text-xs text-slate-400 truncate mt-0.5"
                  id="preview-hc"
                >
                  Chai aur Code
                </p>
              </div>
            </button>

            <button
              id="btn-piyush"
              class="w-full text-left p-3 rounded-2xl flex items-center gap-3 transition-all duration-300 border border-transparent hover:bg-slate-800/40 group cursor-pointer"
            >
              <div class="relative">
                <div
                  class="w-12 h-12 rounded-xl bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center text-white font-bold text-lg shadow-md group-hover:scale-105 transition-transform"
                >
                  PG
                </div>
                <span
                  class="absolute bottom-0 right-0 w-3.5 h-3.5 bg-emerald-500 border-2 border-slate-950 rounded-full animate-pulse"
                ></span>
              </div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center justify-between">
                  <h3
                    class="font-semibold text-sm text-slate-300 group-hover:text-white transition-colors"
                  >
                    Piyush Garg
                  </h3>
                  <span
                    class="text-[10px] text-cyan-400 font-medium px-1.5 py-0.5 rounded-md bg-cyan-500/10 uppercase"
                    >Pro Dev</span
                  >
                </div>
                <p
                  class="text-xs text-slate-500 truncate mt-0.5"
                  id="preview-piyush"
                >
                  Principal Engineer
                </p>
              </div>
            </button>
          </div>
        </div>

        <div
          class="hidden md:flex items-center justify-between pt-4 border-t border-slate-900 text-xs text-slate-500 px-2 relative"
        >
          <span>Status: Instructor are Active</span>
          <i
            class="fa-solid fa-circle text-[8px] text-green-500 animate-pulse"
          ></i>
        </div>
      </div>

      <div class="flex-1 flex flex-col h-full bg-slate-950/20">
        <div
          class="p-4 border-b border-slate-800/60 flex items-center justify-between bg-slate-950/20"
        >
          <div class="flex items-center gap-3">
            <div
              id="active-avatar"
              class="w-10 h-10 rounded-xl bg-gradient-to-br from-amber-500 to-orange-600 flex items-center justify-center text-white font-bold transition-all duration-300"
            >
              HC
            </div>
            <div>
              <h2 id="active-name" class="font-semibold text-sm text-white">
                Hitesh Choudhary
              </h2>
              <p
                id="active-status"
                class="text-xs text-indigo-400 font-medium flex items-center gap-1.5"
              >
                <span class="w-1.5 h-1.5 bg-indigo-400 rounded-full"></span>
                Retired from corporate and full time YouTuber
              </p>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <!-- <button
              class="w-9 h-9 rounded-lg border border-slate-800 flex items-center justify-center text-slate-400 hover:text-white hover:bg-slate-800/50 transition-all"
            >
              <i class="fa-solid fa-phone text-xs"></i>
            </button>
            <button
              class="w-9 h-9 rounded-lg border border-slate-800 flex items-center justify-center text-slate-400 hover:text-white hover:bg-slate-800/50 transition-all"
            >
              <i class="fa-solid fa-video text-xs"></i>
            </button> -->
            <button
              class="w-9 h-9 rounded-lg border border-slate-800 flex items-center justify-center text-slate-400 hover:text-white hover:bg-slate-800/50 transition-all"
            >
              <i class="fa-solid fa-ellipsis-vertical text-xs"></i>
            </button>
          </div>
        </div>

        <div
          class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar"
          id="chat-history"
        ></div>

        <div
          id="typing-indicator"
          class="px-6 py-2 text-xs text-slate-400 flex items-center gap-2 hidden"
        >
          <span id="typing-text">Hitesh is coding a response</span>
          <div class="flex gap-1">
            <span
              class="w-1 h-1 bg-slate-400 rounded-full animate-bounce"
              style="animation-delay: 0.1s"
            ></span>
            <span
              class="w-1 h-1 bg-slate-400 rounded-full animate-bounce"
              style="animation-delay: 0.2s"
            ></span>
            <span
              class="w-1 h-1 bg-slate-400 rounded-full animate-bounce"
              style="animation-delay: 0.3s"
            ></span>
          </div>
        </div>

        <div class="p-4 bg-slate-950/40 border-t border-slate-800/60">
          <form id="chat-form" class="flex items-center gap-2 relative">
            <div class="flex-1 relative flex items-center">
              <button
                id="emoji-btn"
                type="button"
                class="absolute left-3 text-slate-500 hover:text-slate-300 transition-colors cursor-pointer"
              >
                <i class="fa-regular fa-face-smile text-lg"></i>
              </button>
              <input
                type="text"
                id="message-input"
                autocomplete="off"
                placeholder="Ask Hitesh about System Design, JavaScript or Chai..."
                class="w-full bg-slate-900/80 border border-slate-800 rounded-2xl pl-11 pr-12 py-3.5 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500/30 transition-all"
              />
              <!-- <button
                type="button"
                class="absolute right-3 text-slate-500 hover:text-slate-300 transition-colors"
              >
                <i class="fa-solid fa-paperclip text-md"></i>
              </button> -->
            </div>
            <button
              type="submit"
              id="send-btn"
              class="h-12 w-12 rounded-2xl bg-indigo-600 hover:bg-indigo-500 flex items-center justify-center text-white font-medium transition-all shadow-lg shadow-indigo-600/20 active:scale-95 shrink-0 cursor-pointer"
            >
              <i class="fa-solid fa-paper-plane text-sm"></i>
            </button>
          </form>
        </div>
      </div>
    </div>
    <script type="module" src="src/script.js"></script>
  </body>
</html>
